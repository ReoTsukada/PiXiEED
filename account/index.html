<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>マイページ | PiXiEED</title>
  <meta name="description" content="PiXiEEDのマイページです。Googleログイン、プロフィール、アイコン、Xアカウントを管理できます。">
  <link rel="canonical" href="https://pixieed.jp/account/">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="PiXiEED">
  <meta property="og:title" content="マイページ | PiXiEED">
  <meta property="og:description" content="PiXiEEDのマイページです。Googleログイン、プロフィール、アイコン、Xアカウントを管理できます。">
  <meta property="og:url" content="https://pixieed.jp/account/">
  <meta property="og:image" content="https://pixieed.jp/PiXiEEDogp.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="マイページ | PiXiEED">
  <meta name="twitter:description" content="PiXiEEDのマイページです。Googleログイン、プロフィール、アイコン、Xアカウントを管理できます。">
  <meta name="twitter:image" content="https://pixieed.jp/PiXiEEDogp.png">
  <link rel="icon" type="image/png" href="../character-dots/maousama.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Fredoka:wght@600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../site/landing.css?v=2026.06.23-account">
  <style>
    .account-page{
      display:grid;
      gap:12px;
    }
    .account-title{
      margin:0;
      padding:2px 2px 0;
    }
    .account-grid{
      display:grid;
      grid-template-columns:1.1fr .9fr;
      gap:14px;
    }
    .account-stack{
      display:grid;
      gap:14px;
    }
    .account-panel{
      padding:16px;
      border:1px solid rgba(255,255,255,0.12);
      border-radius:18px;
      background:rgba(255,255,255,0.05);
      box-shadow:0 18px 48px rgba(0,0,0,0.22);
      display:grid;
      gap:12px;
    }
    .account-list{
      display:grid;
      gap:10px;
    }
    .account-item{
      display:grid;
      grid-template-columns:72px 1fr auto;
      gap:12px;
      padding:12px;
      border-radius:18px;
      background:rgba(255,255,255,0.04);
      border:1px solid rgba(255,255,255,0.08);
      align-items:center;
    }
    .account-cover{
      width:72px;
      height:72px;
      border-radius:14px;
      background:linear-gradient(135deg,rgba(255,159,67,.28),rgba(255,255,255,.03));
      border:1px solid rgba(255,255,255,0.08);
      overflow:hidden;
      display:grid;
      place-items:center;
    }
    .account-cover img{
      width:72%;
      height:72%;
      object-fit:contain;
      image-rendering:pixelated;
    }
    .account-panel__head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
    }
    .account-panel__head .section-title{
      margin:0;
    }
    .account-item strong{display:block;font-size:14px}
    .account-item__body span{display:block;color:#cbd5e1;font-size:12px}
    .account-item__body{display:grid;gap:4px;min-width:0}
    .account-chip{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:6px 10px;
      border-radius:999px;
      background:rgba(255,255,255,0.08);
      border:1px solid rgba(255,255,255,0.12);
      color:#e5e7eb;
      font-size:12px;
      font-weight:700;
      white-space:nowrap;
    }
    .account-action{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:38px;
      padding:8px 12px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,0.14);
      background:linear-gradient(135deg, rgba(255,159,67,0.95), rgba(255,113,154,0.95));
      color:#111827;
      font-size:12px;
      font-weight:800;
      white-space:nowrap;
      text-decoration:none;
      cursor:pointer;
      font-family:inherit;
    }
    .account-action:disabled{
      cursor:wait;
      opacity:.68;
    }
    .account-panel--profile{
      gap:12px;
    }
    .account-profile-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(min(100%, 250px), 1fr));
      gap:12px;
      align-items:stretch;
    }
    .account-panel--profile .profile-block{
      min-width:0;
      align-content:start;
      border-radius:14px;
      padding:14px;
    }
    .account-panel--profile .profile-block--profile{
      background:linear-gradient(180deg, rgba(124,58,237,0.14), rgba(255,255,255,0.045));
      border-color:rgba(196,181,253,0.2);
    }
    .account-panel--profile .profile-block--login{
      background:linear-gradient(180deg, rgba(59,130,246,0.13), rgba(255,255,255,0.045));
      border-color:rgba(147,197,253,0.2);
    }
    .account-panel--profile .profile-row{
      align-items:center;
    }
    .account-panel--profile .auth-status,
    .account-panel--profile .helper{
      margin:0;
    }
    .account-panel--profile .auth-actions{
      margin-top:auto;
    }
    @media (max-width: 900px){
      .account-grid{grid-template-columns:1fr}
      .account-item{grid-template-columns:64px 1fr auto}
      .account-cover{width:64px;height:64px}
    }
  </style>
</head>
<body>
  <div class="page">
    <main class="page-shell account-page">
      <h1 class="section-title account-title" id="accountTitle">マイページ</h1>

      <div class="account-grid">
        <section class="account-stack" aria-label="作品">
          <section class="account-panel account-panel--profile" id="authPanel" aria-hidden="false" aria-label="アカウント">
            <h2 class="section-title">アカウント</h2>
            <div class="account-profile-grid">
              <div class="profile-block profile-block--profile">
                <div class="auth-section-head">
                  <strong>プロフィール</strong>
                  <span>表示名とアイコン</span>
                </div>
                <div class="profile-row">
                  <button class="avatar-toggle" id="avatarToggle" type="button" aria-label="アイコンを変更" aria-expanded="false" aria-controls="avatarPanel">
                    <span class="avatar-toggle__img" id="avatarPreview"></span>
                  </button>
                  <label class="profile-name">
                    <span style="font-weight:700; color:#e5e7eb;">ニックネーム</span>
                    <input class="auth-input" id="profileNickname" type="text" placeholder="なまえ" maxlength="32">
                  </label>
                </div>
                <div class="avatar-panel" id="avatarPanel" hidden>
                  <div class="avatar-grid" id="avatarGrid"></div>
                </div>
                <label class="profile-name">
                  <span style="font-weight:700; color:#e5e7eb;">X (旧Twitter)</span>
                  <input class="auth-input" id="profileX" type="url" placeholder="https://x.com/username" maxlength="200" inputmode="url">
                </label>
                <button class="auth-btn" id="saveProfile" type="button">プロフィールを保存</button>
                <p class="auth-status" id="authStatus"></p>
              </div>
              <div class="profile-block profile-block--login" id="pixieedSharedAuthLoginBlock">
                <div class="auth-section-head">
                  <strong>ログイン</strong>
                  <span>同期</span>
                </div>
                <p class="auth-login-copy">別端末でも同じプロフィールを使えます。</p>
                <div class="auth-social-grid" id="authSocialButtons">
                  <button class="auth-btn auth-btn--google" data-auth-provider="google" data-auth-label="Google" type="button">
                    <span class="auth-google-icon" aria-hidden="true">
                      <svg viewBox="0 0 18 18" focusable="false">
                        <path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84a4.14 4.14 0 0 1-1.8 2.72v2.26h2.92c1.7-1.57 2.68-3.88 2.68-6.62z"/>
                        <path fill="#34A853" d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.92-2.26c-.8.54-1.84.86-3.04.86-2.34 0-4.33-1.58-5.04-3.7H.94v2.34A9 9 0 0 0 9 18z"/>
                        <path fill="#FBBC05" d="M3.96 10.72A5.4 5.4 0 0 1 3.68 9c0-.6.1-1.18.28-1.72V4.94H.94A9 9 0 0 0 0 9c0 1.45.34 2.82.94 4.06l3.02-2.34z"/>
                        <path fill="#EA4335" d="M9 3.58c1.32 0 2.5.45 3.44 1.34l2.58-2.58C13.46.9 11.42 0 9 0A9 9 0 0 0 .94 4.94l3.02 2.34C4.67 5.16 6.66 3.58 9 3.58z"/>
                      </svg>
                    </span>
                    <span>Googleでログイン</span>
                  </button>
                </div>
                <button class="auth-btn auth-btn--email" id="authEmailToggle" type="button">メールログインを開く</button>
                <div id="authInputs" style="display:none; gap:8px;" data-expanded="false">
                  <input class="auth-input" id="authEmail" type="email" placeholder="メールアドレス" autocomplete="email">
                  <input class="auth-input" id="authPasscode" type="password" placeholder="パスコード（6〜20文字）" autocomplete="current-password">
                </div>
                <div class="auth-actions" style="display:grid; gap:8px;">
                  <button class="auth-btn" id="authLoginBtn" type="button">ログイン</button>
                </div>
                <button class="auth-btn logout" id="logoutBtn" type="button" style="display:none;">ログアウト</button>
                <span class="helper" id="linkedEmail" style="display:none;"></span>
                <p class="helper" id="authAccountStatus"></p>
              </div>
            </div>
          </section>

          <section class="account-panel">
            <div class="account-panel__head">
              <h2 class="section-title">PiXiEEDraw</h2>
              <span class="account-chip" id="localProjectCount">確認中</span>
            </div>
            <div class="account-list" id="localProjectList">
              <div class="account-item">
                <div class="account-cover">
                  <img src="../icon/icon-192-4.png" alt="">
                </div>
                <div class="account-item__body">
                  <strong>作品がありません</strong>
                  <span>PiXiEEDrawの端末内保存がここに出ます。</span>
                </div>
                <span class="account-chip">0件</span>
              </div>
            </div>
          </section>
        </section>

        <section class="account-stack" aria-label="購入済みQR">
          <section class="account-panel">
            <h2 class="section-title">購入済みQR</h2>
            <div class="account-list" id="ownedQrList" aria-label="購入済みQR一覧">
              <div class="account-item">
                <div class="account-cover">
                  <img src="../icon/icon-192-6.png" alt="">
                </div>
                <div class="account-item__body">
                  <strong>まだ購入済みQRはありません</strong>
                  <span>購入後にここへ表示されます。</span>
                </div>
                <a class="account-action" href="../qr/index.html">設定する</a>
              </div>
            </div>
          </section>
        </section>
      </div>
    </main>
  </div>

  <script src="../scripts/shared-auth-panel.js?v=2026.07.03-account-login-health-v1"></script>
  <script src="../scripts/shared-bottom-nav.js"></script>
  <script src="../scripts/account-local-projects.js?v=2026.07.01-local-projects"></script>
  <script src="../scripts/pixel-art-fit.js"></script>
</body>
</html>
