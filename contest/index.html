<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
  <meta name="robots" content="noai,noimageai,noarchive"/>
  <title>PiXiEED 広場</title>
  <meta name="description" content="PiXiEEDの広場。24時間だけ並ぶ投稿画像を眺めながら、画像へリプライできるシンプルな白い空間です。"/>
  <link rel="canonical" href="https://pixieed.jp/contest/"/>
  <meta property="og:type" content="website"/>
  <meta property="og:site_name" content="PiXiEED"/>
  <meta property="og:title" content="PiXiEED | 広場"/>
  <meta property="og:description" content="24時間だけ並ぶ投稿画像を眺めながら、画像へリプライできるPiXiEEDの広場です。"/>
  <meta property="og:url" content="https://pixieed.jp/contest/"/>
  <meta property="og:image" content="https://pixieed.jp/PiXiEEDogp.png"/>
  <meta property="og:locale" content="ja_JP"/>
  <meta name="twitter:card" content="summary_large_image"/>
  <meta name="twitter:site" content="@PiXiEED_arta"/>
  <meta name="twitter:url" content="https://pixieed.jp/contest/"/>
  <meta name="twitter:title" content="PiXiEED | 広場"/>
  <meta name="twitter:description" content="24時間だけ並ぶ投稿画像を眺めながら、画像へリプライできるPiXiEEDの広場です。"/>
  <meta name="twitter:image" content="https://pixieed.jp/PiXiEEDogp.png"/>
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@graph": [
      {
        "@type": "WebApplication",
        "name": "PiXiEED 広場",
        "url": "https://pixieed.jp/contest/",
        "applicationCategory": "SocialNetworkingApplication",
        "description": "24時間だけ並ぶ投稿画像を眺めながら、画像へリプライできるPiXiEEDの広場です。"
      },
      {
        "@type": "BreadcrumbList",
        "itemListElement": [
          { "@type": "ListItem", "position": 1, "name": "PiXiEED", "item": "https://pixieed.jp/" },
          { "@type": "ListItem", "position": 2, "name": "広場", "item": "https://pixieed.jp/contest/" }
        ]
      }
    ]
  }
  </script>
  <link rel="icon" type="image/png" href="../character-dots/maousama.png"/>
  <link rel="apple-touch-icon" href="/icon/PiXiEED.icon512.png"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link rel="preconnect" href="https://kyyiuakrqomzlikfaire.supabase.co" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Fredoka:wght@600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="./assets/css/plaza.css?v=2026.06.26-realtime-replies"/>
  <script src="../scripts/ad-account-control.js?v=2026.07.18-ad-permissions1"></script>
</head>
<body data-page="plaza">
  <header class="plaza-header" aria-label="トップ">
    <div class="plaza-header__inner">
      <button class="brand" id="openProfilePanel" type="button" aria-label="プロフィールを開く">
        <span class="brand-icon" id="brandAvatar">
          <img src="../character-dots/maousama.png" alt=""/>
        </span>
        <span class="brand-text">
          <span class="brand-title">PiXiEED</span>
          <span class="brand-sub" id="brandUser">ユーザー</span>
        </span>
      </button>
      <div class="plaza-header__status" aria-live="polite">
        <span class="plaza-pill">広場</span>
        <span class="plaza-pill plaza-pill--people"><span id="participantCount">1</span>人</span>
      </div>
    </div>
  </header>

  <main class="page plaza-page">
    <section class="plaza-app" aria-label="PiXiEED 広場">
      <div class="plaza-topbar">
        <div>
          <h1>PiXiEED 広場</h1>
          <p id="plazaStatus" class="plaza-status">接続準備中</p>
        </div>
        <div class="plaza-meters" aria-label="投稿情報">
          <span class="plaza-meter"><span id="artworkCounter">0</span>件</span>
        </div>
      </div>

      <div class="plaza-layout">
        <section class="plaza-stage-panel" aria-label="広場">
          <div class="plaza-scene" id="plazaScene" tabindex="0">
            <div class="plaza-world" id="plazaWorld">
              <div class="plaza-artwork-wall" id="artworkWall" aria-label="24時間以内の投稿スロット"></div>
              <div class="plaza-empty-wall" id="emptyArtworkWall">
                <strong>投稿待ち</strong>
                <span>＋から画像を投稿できます</span>
              </div>

              <div class="move-target-marker" id="moveTargetMarker" hidden aria-hidden="true"></div>
              <div class="avatar-layer" id="avatarLayer" aria-hidden="true"></div>
            </div>
            <div class="scene-notice" id="sceneNotice" aria-live="polite"></div>
          </div>

          <div class="plaza-commandbar">
            <form class="plaza-message-form" id="chatForm">
              <div class="plaza-plus-wrap">
                <button class="plaza-plus-button" id="plazaPlusButton" type="button" aria-label="オプションを開く" aria-haspopup="menu" aria-expanded="false" aria-controls="plazaOptionMenu">+</button>
                <div class="plaza-option-menu" id="plazaOptionMenu" role="menu" hidden>
                  <button class="plaza-option-button" data-option-action="post" type="button" role="menuitem">画像投稿</button>
                  <button class="plaza-option-button" data-option-action="world" type="button" role="menuitem">ワールド発言</button>
                  <button class="plaza-option-button" data-option-action="direct" type="button" role="menuitem">ユーザー宛て</button>
                  <button class="plaza-option-button" data-option-action="mention" type="button" role="menuitem">メンション</button>
                  <button class="plaza-option-button" data-option-action="clear" type="button" role="menuitem">リプライ解除</button>
                </div>
              </div>
              <label class="plaza-message-field">
                <span id="replyTargetLabel">ワールド発言</span>
                <input id="chatInput" type="text" maxlength="180" autocomplete="off" placeholder="/to 名前 本文 または コメント"/>
              </label>
              <button class="plaza-send-button" type="submit">送信</button>
            </form>
          </div>
        </section>
      </div>
    </section>
  </main>

  <div class="modal-panel" id="postPanel" aria-hidden="true">
    <div class="modal-card modal-card--post" role="dialog" aria-modal="true" aria-labelledby="postPanelTitle">
      <div class="modal-head">
        <h2 id="postPanelTitle">作品投稿</h2>
        <button class="close-btn" id="closePostPanel" type="button">閉じる</button>
      </div>
      <form class="post-form" id="postForm">
        <label class="form-field">
          <span>作品名</span>
          <input id="postTitle" type="text" maxlength="60" placeholder="無題"/>
        </label>
        <label class="form-field">
          <span>画像</span>
          <input id="postFile" type="file" accept="image/png,image/jpeg,image/webp"/>
        </label>
        <div class="post-preview" id="postPreview">
          <span>プレビュー</span>
          <img id="postPreviewImage" alt="投稿プレビュー"/>
        </div>
        <p class="form-note">PNG / JPEG / WebP、5MB以内。最大256 x 256pxに整えて、投稿から24時間だけ広場に表示されます。</p>
        <button class="primary-button" type="submit">投稿する</button>
        <p class="form-status" id="postStatus" aria-live="polite"></p>
      </form>
    </div>
  </div>

  <div class="modal-panel" id="artworkPanel" aria-hidden="true">
    <div class="modal-card modal-card--artwork" role="dialog" aria-modal="true" aria-labelledby="artworkPanelTitle">
      <div class="modal-head">
        <h2 id="artworkPanelTitle">作品詳細</h2>
        <button class="close-btn" id="closeArtworkPanel" type="button">閉じる</button>
      </div>
      <div class="artwork-detail">
        <img id="detailArtworkImage" alt="作品詳細"/>
        <div class="artwork-detail__body">
          <h3 id="detailArtworkTitle">-</h3>
          <p id="detailArtworkMeta">-</p>
          <div class="artwork-detail__actions">
            <button class="tool-button" id="reportArtworkButton" type="button">通報</button>
            <button class="tool-button tool-button--danger" id="deleteArtworkButton" type="button" hidden>自分の投稿を削除</button>
          </div>
          <p class="form-status" id="detailStatus" aria-live="polite"></p>
        </div>
      </div>
    </div>
  </div>

  <div class="auth-panel" id="authPanel" aria-hidden="true">
    <div class="auth-card" role="dialog" aria-modal="true" aria-labelledby="profilePanelTitle">
      <div class="modal-head">
        <h2 id="profilePanelTitle">プロフィール</h2>
        <button class="close-btn" type="button" id="closeAuthPanel">閉じる</button>
      </div>
      <div class="profile-block">
        <div class="profile-row">
          <button class="avatar-toggle" id="avatarToggle" type="button" aria-label="アイコンを変更" aria-expanded="false" aria-controls="avatarPanel">
            <span class="avatar-toggle__img" id="avatarPreview"></span>
          </button>
          <label class="profile-name">
            <span>ニックネーム</span>
            <input class="auth-input" id="profileNickname" type="text" placeholder="なまえ" maxlength="32"/>
          </label>
        </div>
        <div class="avatar-panel" id="avatarPanel" hidden>
          <div class="avatar-grid" id="avatarGrid"></div>
        </div>
        <label class="profile-name">
          <span>X (旧Twitter)</span>
          <input class="auth-input" id="profileX" type="url" placeholder="https://x.com/username" maxlength="200" inputmode="url"/>
        </label>
        <button class="auth-btn" id="saveProfile" type="button">プロフィールを保存</button>
        <p class="auth-status" id="authStatus" aria-live="polite"></p>
      </div>
    </div>
  </div>

  <script defer src="../scripts/shared-auth-panel.js?v=2026.07.18-ad-permissions1"></script>
  <script defer src="../scripts/shared-bottom-nav.js?v=2026.07.18-ad-permissions1"></script>
  <script defer src="../scripts/bottom-nav-footer-ad.js?v=2026.07.18-ad-permissions1"></script>
  <script defer src="./assets/js/plaza.js?v=2026.06.26-realtime-replies"></script>
</body>
</html>
