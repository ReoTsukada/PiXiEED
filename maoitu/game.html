<script id="ads-lazy">
  (function() {
    if (window.pixieedObserveAds) return;

    const SLOT_SEQUENCE = ['2141591954','9073878884','2261515379'];
    const SLOT_KEY = 'pixieedAdSlotIndex';
    const LOAD_TIMEOUT_MS = 10000;
    const READY_POLL_MS = 250;

    let slotIndex = 0;
    let activeAd = null;
    let readyTimer = null;
    const queue = [];

    const readSlotIndex = () => {
      try {
        const stored = sessionStorage.getItem(SLOT_KEY);
        if (stored !== null) slotIndex = Number(stored) || 0;
      } catch (err) {}
    };

    const storeSlotIndex = () => {
      try {
        sessionStorage.setItem(SLOT_KEY, String(slotIndex));
      } catch (err) {}
    };

    readSlotIndex();

    const nextSlot = () => {
      if (!SLOT_SEQUENCE.length) return '';
      const slot = SLOT_SEQUENCE[slotIndex % SLOT_SEQUENCE.length];
      slotIndex += 1;
      storeSlotIndex();
      return slot;
    };

    const isReady = (ins) => (
      ins.getAttribute('data-adsbygoogle-status') === 'done' ||
      ins.getAttribute('data-ad-status') === 'filled'
    );

    const isEnqueued = (ins) => ins.dataset.adsQueueEnqueued === '1';
    const isLoading = (ins) => ins.dataset.adsQueueLoading === '1';
    const isLoaded = (ins) => ins.dataset.adsLazyLoaded === '1' || isReady(ins);

    const assignSlot = (ins) => {
      if (!ins || !(ins instanceof HTMLElement)) return;
      if (ins.dataset.adSlotAssigned === '1') return;
      const existingSlot = ins.getAttribute('data-ad-slot');
      if (existingSlot && existingSlot !== 'rotate') {
        ins.dataset.adSlotAssigned = '1';
        return;
      }
      if (ins.dataset.adStatic === '1') {
        ins.dataset.adSlotAssigned = '1';
        return;
      }
      const slot = nextSlot();
      if (slot) {
        ins.setAttribute('data-ad-slot', slot);
      }
      ins.dataset.adSlotAssigned = '1';
    };

    const clearReadyTimer = () => {
      if (!readyTimer) return;
      clearTimeout(readyTimer);
      readyTimer = null;
    };

    const releaseActiveAd = () => {
      clearReadyTimer();
      if (!activeAd) return;
      activeAd.dataset.adsQueueLoading = '';
      activeAd.dataset.adsQueueEnqueued = '';
      activeAd.dataset.adsLazyLoaded = '1';
      activeAd = null;
      processQueue();
    };

    const waitUntilReady = (ins, startedAt) => {
      if (!activeAd || activeAd !== ins) return;
      if (!document.contains(ins) || isReady(ins) || (Date.now() - startedAt) >= LOAD_TIMEOUT_MS) {
        releaseActiveAd();
        return;
      }
      readyTimer = setTimeout(() => waitUntilReady(ins, startedAt), READY_POLL_MS);
    };

    const loadAd = (ins) => {
      if (!ins || !(ins instanceof HTMLElement)) return false;
      if (isLoaded(ins) || isLoading(ins)) return true;
      assignSlot(ins);
      ins.dataset.adsQueueLoading = '1';
      ins.dataset.adsLazyLoaded = '1';
      try {
        (window.adsbygoogle = window.adsbygoogle || []).push({});
      } catch (err) {
        ins.dataset.adsQueueLoading = '';
        ins.dataset.adsLazyLoaded = '';
        return false;
      }
      return true;
    };

    const enqueueAd = (ins) => {
      if (!ins || !(ins instanceof HTMLElement)) return;
      if (isLoaded(ins) || isLoading(ins) || isEnqueued(ins)) return;
      assignSlot(ins);
      ins.dataset.adsQueueEnqueued = '1';
      queue.push(ins);
    };

    function processQueue() {
      if (activeAd) return;
      while (queue.length) {
        const ins = queue.shift();
        if (!ins || !(ins instanceof HTMLElement)) continue;
        if (!document.contains(ins)) continue;
        ins.dataset.adsQueueEnqueued = '';
        if (isLoaded(ins)) {
          ins.dataset.adsLazyLoaded = '1';
          continue;
        }
        activeAd = ins;
        const startedAt = Date.now();
        if (!loadAd(ins)) {
          activeAd = null;
          setTimeout(() => {
            if (!document.contains(ins) || isLoaded(ins)) return;
            enqueueAd(ins);
            processQueue();
          }, 1200);
          return;
        }
        waitUntilReady(ins, startedAt);
        return;
      }
    }

    const observeAds = (root) => {
      const scope = root && root.querySelectorAll ? root : document;
      scope.querySelectorAll('ins.adsbygoogle').forEach(enqueueAd);
      processQueue();
    };

    window.pixieedObserveAds = observeAds;

    const setupQueue = () => {
      observeAds(document);
    };

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', setupQueue);
    } else {
      setupQueue();
    }

    const mo = new MutationObserver((mutations) => {
      mutations.forEach((mutation) => {
        mutation.addedNodes.forEach((node) => {
          if (!(node instanceof HTMLElement)) return;
          if (node.matches && node.matches('ins.adsbygoogle')) {
            enqueueAd(node);
            return;
          }
          if (node.querySelectorAll) {
            node.querySelectorAll('ins.adsbygoogle').forEach(enqueueAd);
          }
        });
      });
      processQueue();
    });

    const startObserver = () => {
      if (!document.body) return;
      mo.observe(document.body, { childList: true, subtree: true });
    };

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', startObserver);
    } else {
      startObserver();
    }
  })();
</script>

function fit(){
  const d=Math.min(devicePixelRatio||1, DPR_CAP);
  const ar=H/W;
  const isEmbedMode = document.documentElement.dataset.embedMode === 'true';
  const safeBottom = (() => {
    if (isEmbedMode) return 0;
    const v = getComputedStyle(document.documentElement).getPropertyValue('--safe-bottom');
    const n = parseFloat(v);
    return Number.isFinite(n) ? n : 0;
  })();
  const footerReserved = isEmbedMode ? 0 : 80 + safeBottom; // standalone keeps the fixed ad area.
  const availableHeight = Math.max(120, innerHeight - footerReserved);
  const maxHeight = availableHeight * (isEmbedMode ? 0.995 : 0.98);
  const maxWidthFromHeight = maxHeight / ar;
  const maxWidth = innerWidth * (isEmbedMode ? 0.995 : 0.98);
  const w=Math.min(maxWidth, maxWidthFromHeight)|0;
  const h=(w*ar)|0;
  c.style.width=w+'px'; c.style.height=h+'px';
  c.width=(w*d)|0; c.height=(h*d)|0;
  x.setTransform((w*d)/W,0,0,(h*d)/H,0,0);

}

function lerp(a,b,t){ return a + (b - a) * t; }
function interp(prev, current, alpha){
  const base = Number.isFinite(prev) ? prev : current;
  return lerp(base, current, alpha);
}
function easeOutCubic(t){
  const clamped = Math.max(0, Math.min(1, t));

function roundedRectPath(ctx, px, py, pw, ph, radius){
  const r = Math.max(0, Math.min(radius, pw * 0.5, ph * 0.5));
  ctx.beginPath();
  ctx.moveTo(px + r, py);
  ctx.lineTo(px + pw - r, py);
  ctx.quadraticCurveTo(px + pw, py, px + pw, py + r);
  ctx.lineTo(px + pw, py + ph - r);
  ctx.quadraticCurveTo(px + pw, py + ph, px + pw - r, py + ph);
  ctx.lineTo(px + r, py + ph);
  ctx.quadraticCurveTo(px, py + ph, px, py + ph - r);
  ctx.lineTo(px, py + r);
  ctx.quadraticCurveTo(px, py, px + r, py);
}

function createFeverSkyCache(){

function createFeverFrameCache(){

    const oc=document.createElement('canvas');
    oc.width=W; oc.height=H;
    const ctx=oc.getContext('2d');
    const inset = 3;

    const pulse = 0.5 + 0.5 * Math.sin(phase * Math.PI * 2);
    const sweep = ctx.createLinearGradient(-W + phase * W * 2, 0, phase * W * 2, H);

    ctx.globalAlpha = 0.86;
    roundedRectPath(ctx, inset + 5, inset + 5, W - (inset + 5) * 2, H - (inset + 5) * 2, radius - 2);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.globalAlpha = 0.22 + pulse * 0.12;
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, W, 2);
    ctx.fillRect(0, H - 2, W, 2);
    ctx.fillRect(0, 0, 2, H);
    ctx.fillRect(W - 2, 0, 2, H);
    return oc;
  });
}

} = {}){

function drawProgressSpaceLayers(){
  const progress = Math.max(0, difficultyLevel - 1) / 2.25;
  const baseIndex = Math.floor(progress) % DEEP_SPACE_LAYERS.length;
  const nextIndex = (baseIndex + 1) % DEEP_SPACE_LAYERS.length;
  const mix = progress - Math.floor(progress);
  const depthAlpha = Math.min(0.72, 0.2 + Math.max(0, difficultyLevel - 1) * 0.045);
  x.save();
  x.globalCompositeOperation = 'screen';
  x.globalAlpha = depthAlpha * (1 - mix);
  x.drawImage(DEEP_SPACE_LAYERS[baseIndex], 0, 0, W, H);

  x.drawImage(DEEP_SPACE_LAYERS[nextIndex], 0, 0, W, H);
  x.restore();
}

function spawnBurst(cx, cy, {
  count = 14,
  color = '255,255,255',
  speedMin = 0.4,
  speedMax = 2.2,
  lifeMin = 18,
  lifeMax = 34,
  sizeMin = 1.5,
  sizeMax = 4.5,
  gravity = 0.01
} = {}){
  const scaledCount = currentBurstCount(count);
  const remaining = Math.max(0, currentParticleBudget() - particles.length);
  const limit = Math.min(scaledCount, remaining);
  for(let i = 0; i < limit; i++){
    const angle = Math.random() * Math.PI * 2;
    const speed = rnd(speedMin, speedMax);
    const particle = {
      x: cx,
      y: cy,
      px: cx,
      py: cy,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      size: rnd(sizeMin, sizeMax),
      life: rnd(lifeMin, lifeMax),
      maxLife: 1,
      gravity,
      color
    };
    particle.maxLife = particle.life;
    particles.push(particle);
  }
}
function updateParticles(){
  let writeIndex = 0;
  for(let readIndex = 0; readIndex < particles.length; readIndex++){
    const p = particles[readIndex];
    p.px = p.x;
    p.py = p.y;
    p.x += p.vx;
    p.y += p.vy;
    p.vy += p.gravity;
    p.vx *= 0.985;
    p.vy *= 0.992;
    p.life -= 1;
    if(p.life > 0){
      particles[writeIndex++] = p;
    }
  }
  particles.length = writeIndex;
}

// ====== 楕円ベースのゆるい当たり判定 ======
function hitBox(a, b){
  function ellipse(o, fx=0.8, fy=0.6){
    const rx = o.w * fx / 2;
    const ry = o.h * fy / 2;
    return {
      cx: o.x + o.w / 2,
      cy: o.y + o.h / 2,
      rx,
      ry
    };
  }
  const ea = ellipse(a, 0.8, 0.6);
  const eb = ellipse(b, 0.8, 0.6);
  const dx = ea.cx - eb.cx;
  const dy = ea.cy - eb.cy;
  const rx = ea.rx + eb.rx;
  const ry = ea.ry + eb.ry;
  if(rx === 0 || ry === 0) return false;
  return (dx * dx) / (rx * rx) + (dy * dy) / (ry * ry) <= 1;
}

function rectsOverlap(a, b){
  return !(
    a.x + a.w < b.x ||
    b.x + b.w < a.x ||
    a.y + a.h < b.y ||
    b.y + b.h < a.y
  );
}

async function refreshRankLabel(score){
  if(!rankPercentLabel) return;
  if(!fetchRankInfo){
    rankPercentLabel.textContent = '';
    return;
  }
  const requestId = ++currentRankRequestId;
  rankPercentLabel.textContent = '順位計算中...';
  try{
    const result = await Promise.race([
      fetchRankInfo(score),
      new Promise((_, reject) => {
        window.setTimeout(() => reject(new Error('rank-timeout')), RANK_LABEL_TIMEOUT_MS);
      })
    ]);
    const { total, rank, percentile } = result || {};
    if(requestId !== currentRankRequestId) return;
    if(!total){
      rankPercentLabel.textContent = 'まだスコアがありません';
      return;
    }
    if(rank <= 100){
      rankPercentLabel.textContent = `現在の順位: ${rank}位`;
    }else{
      const rounded = Math.max(1, Math.round(percentile * 10) / 10);
      rankPercentLabel.textContent = `上位 ${rounded}%`;
    }
  }catch(_){
    if(requestId === currentRankRequestId){
      rankPercentLabel.textContent = '順位を取得できませんでした';
    }
  }
}

function step(){
  snapshotPrevPosition(P);
  E.forEach(snapshotPrevPosition);
  angels.forEach(snapshotPrevPosition);
  starOffsetPrev = starOffset;
  starOffsetNearPrev = starOffsetNear;
  if(hitstopFrames > 0){
    hitstopFrames--;
    updateAnnouncements();
    return;
  }
  const enemySpawnEnabled = elapsedFrames >= ENEMY_GRACE_FRAMES;
  if(enemySpawnEnabled && o % enemySpawnIntervalFrames === 0){
    for(let i=0;i<enemiesPerSpawn;i++) spawnEnemy();
  }
  if(o % ANGEL_BASE_INTERVAL === 0 && Math.random() < ANGEL_SPAWN_PROB) spawnAngel();
  o++;
  elapsedFrames++;
  const currentSec = elapsedFrames / 60;
  while(unlockedEnemyCount < ENEMY_TYPES.length && currentSec >= ENEMY_TYPES[unlockedEnemyCount].unlockSec){
    unlockedEnemyCount++;
  }
  if(currentSec - lastAngelGuaranteeSec >= ANGEL_GUARANTEE_INTERVAL_SEC){
    spawnAngel();
    lastAngelGuaranteeSec = currentSec;
  }

  const speedScale = feverFrames > 0 ? FEVER_SPEED_SCALE : 1;
  const playerSpeed = feverFrames > 0 ? P.v * FEVER_PLAYER_SPEED_MULT : P.v;

  E.forEach(e=>{
    if (e.followPlayer) {
      const dx = (P.x - e.x);
      const step = Math.sign(dx) * Math.min(Math.abs(dx), e.followStrength * speedScale);
      e.x += step;
      e.x = Math.max(0, Math.min(W - e.w, e.x));
    }
    if (e.zigzag && e.vx){
      e.x += e.vx * speedScale;
      if (e.x <= 0){
        e.x = 0;
        e.vx = Math.abs(e.vx);
      }else if (e.x + e.w >= W){
        e.x = W - e.w;
        e.vx = -Math.abs(e.vx);
      }
    }
    e.y+=e.v * speedScale;
  });
  angels.forEach(a=>a.y+=a.v);

  const dx=tx-P.x; P.x+=Math.sign(dx)*Math.min(Math.abs(dx),playerSpeed);
  P.x=Math.max(0,Math.min(W-P.w,P.x));

  let angelWriteIndex = 0;
  for(let angelReadIndex = 0; angelReadIndex < angels.length; angelReadIndex++){
    const a = angels[angelReadIndex];
    if(hitBox(P,a)){
      shieldCharges += 1;
      P.skin = ANGEL;
      shieldFlashFrames = SHIELD_FLASH_FRAMES;
      feverGauge = Math.min(FEVER_THRESHOLD_FRAMES, feverGauge + FEVER_GAUGE_BOOST_ON_PICKUP);
      queueAnnouncement('ANGELIN GET', '身代わりシールド +1', '#34d399', 72);
      spawnBurst(a.x + a.w * 0.5, a.y + a.h * 0.5, {
        count: 18,
        color: '52,211,153',
        speedMin: 0.5,
        speedMax: 2.4,
        lifeMin: 18,
        lifeMax: 34,
        sizeMin: 2,
        sizeMax: 5,
        gravity: -0.002
      });
      continue;
    }
    if(a.y < H + 20){
      angels[angelWriteIndex++] = a;
    }
  }
  angels.length = angelWriteIndex;

  for (let i = 0; i < E.length; i++) {
    const stickyEnemy = E[i];
    if (!stickyEnemy.sticky) continue;
    for (let j = E.length - 1; j >= 0; j--) {
      if (i === j) continue;
      const target = E[j];
      if (!rectsOverlap(stickyEnemy, target)) continue;
      stickyEnemy.v += target.v * 0.2;
      const newW = stickyEnemy.w * 1.05;
      const newH = stickyEnemy.h * 1.05;
      const deltaW = newW - stickyEnemy.w;
      const deltaH = newH - stickyEnemy.h;
      stickyEnemy.x -= deltaW / 2;
      stickyEnemy.y -= deltaH / 2;
      stickyEnemy.w = newW;
      stickyEnemy.h = newH;
      stickyEnemy.x = Math.max(0, Math.min(W - stickyEnemy.w, stickyEnemy.x));
      stickyEnemy.y = Math.max(-40, Math.min(H, stickyEnemy.y));
      stickyEnemy.absorbed = (stickyEnemy.absorbed || 0) + 1;
      E.splice(j, 1);
      if (j < i) {
        i--;
      }
    }
  }

  for(const e of E){
    if(hitBox(P,e)){
      if (e.ignoreShield) {
        spawnBurst(P.x + P.w * 0.5, P.y + P.h * 0.5, {
          count: 26,
          color: '248,113,113',
          speedMin: 0.8,
          speedMax: 3.2,
          lifeMin: 20,
          lifeMax: 40,
          sizeMin: 2,
          sizeMax: 6
        });
        triggerHitstop(HITSTOP_ON_FATAL_FRAMES, SHAKE_INTENSITY_FATAL);
        endRun();
        break;
      }
      if (feverFrames > 0){
        feverFrames = Math.min(FEVER_DURATION_FRAMES, feverFrames + FEVER_HIT_BONUS_FRAMES);
        spawnBurst(e.x + e.w * 0.5, e.y + e.h * 0.5, {
          count: 14,
          color: '250,204,21',
          speedMin: 0.6,
          speedMax: 2.1,
          lifeMin: 14,
          lifeMax: 28,
          sizeMin: 1.5,
          sizeMax: 4.5,
          gravity: -0.003
        });
        e.y = H + 99; // 無敵中は敵を消す
        continue;
      }
      if(shieldCharges > 0){
        triggerHitstop(HITSTOP_ON_SHIELD_FRAMES, SHAKE_INTENSITY_SHIELD);
        shieldFlashFrames = SHIELD_FLASH_FRAMES;
        queueAnnouncement('GUARD', 'シールドで防いだ', '#7dd3fc', 56);
        spawnBurst(P.x + P.w * 0.5, P.y + P.h * 0.5, {
          count: 16,
          color: '125,211,252',
          speedMin: 0.5,
          speedMax: 2.2,
          lifeMin: 14,
          lifeMax: 30,
          sizeMin: 1.5,
          sizeMax: 4.5,
          gravity: -0.002
        });
        if (e.clearOnShieldHit) {
          shieldCharges = 0; // シールドを全消費
          P.skin = PLAYER;
        } else {
          shieldCharges -= 1;
          if (shieldCharges <= 0){
            shieldCharges = 0;
            P.skin = PLAYER;
          }
        }
        e.y=H+99;
      }else{
        spawnBurst(P.x + P.w * 0.5, P.y + P.h * 0.5, {
          count: 26,
          color: '248,113,113',
          speedMin: 0.8,
          speedMax: 3.2,
          lifeMin: 20,
          lifeMax: 40,
          sizeMin: 2,
          sizeMax: 6
        });
        triggerHitstop(HITSTOP_ON_FATAL_FRAMES, SHAKE_INTENSITY_FATAL);
        endRun();
        break;
      }
    }
  }
  let enemyWriteIndex = 0;
  for(let enemyReadIndex = 0; enemyReadIndex < E.length; enemyReadIndex++){
    const e = E[enemyReadIndex];
    if(e.y < H + 20){
      E[enemyWriteIndex++] = e;
    }
  }
  E.length = enemyWriteIndex;
  if(feverFrames > 0){
    feverFrames--;
    spawnFeverAmbientParticles();
  }else{
    feverGauge = Math.min(FEVER_THRESHOLD_FRAMES, feverGauge + 1);
    if(feverGauge >= FEVER_THRESHOLD_FRAMES){
      startFever();
    }
  }
  const scoreGain = feverFrames > 0 ? FEVER_SCORE_MULT : 1;
  scoreCarry += scoreGain;
  const scoreAdd = Math.floor(scoreCarry);
  if(scoreAdd > 0){
    S += scoreAdd;
    scoreCarry -= scoreAdd;
  }
  starOffset = (starOffset + STAR_SCROLL_SPEED * speedScale);
  starOffsetNear = (starOffsetNear + STAR_SCROLL_SPEED_NEAR * speedScale);

  if(!alive && sharePanel.style.display==='none'){
    showSharePanel(S);
  }
  updateParticles();
  updateAnnouncements();

  const elapsedSec = elapsedFrames / 60;
  if(elapsedSec - lastDifficultyUpdateSec >= DIFFICULTY_STEP_SEC){
    lastDifficultyUpdateSec += DIFFICULTY_STEP_SEC;
    difficultyLevel++;
    if(enemySpawnIntervalFrames > minSpawnIntervalFrames){
      if(enemySpawnIntervalFrames > SLOW_DECREASE_THRESHOLD_FRAMES){
        enemySpawnIntervalFrames = Math.max(SLOW_DECREASE_THRESHOLD_FRAMES, enemySpawnIntervalFrames - SPAWN_INTERVAL_DECREASE);
        if(enemySpawnIntervalFrames <= SLOW_DECREASE_THRESHOLD_FRAMES){
          slowDecreaseToggle = false; // 閾値以下に入った最初のステップは一度スキップする
        }
      }else{
        if(slowDecreaseToggle){
          enemySpawnIntervalFrames = Math.max(minSpawnIntervalFrames, enemySpawnIntervalFrames - SPAWN_INTERVAL_DECREASE);
        }
        slowDecreaseToggle = !slowDecreaseToggle;
      }
    }else{
      enemiesPerSpawn = Math.min(enemiesPerSpawn + 1, maxEnemiesPerSpawn);
    }
    if(difficultyLevel >= maxDifficultyLevel){
      difficultyLevel = maxDifficultyLevel;
      clearRun();
      return;
    }
  }
}
// ====== 描画 ======
function draw(alpha=1){
  const t = Math.max(0, Math.min(1, alpha));
  const playerPx = interp(P.px, P.x, t);
  const playerPy = interp(P.py, P.y, t);
  const cameraTargetX = (playerPx + P.w * 0.5 - W * 0.5) * 0.018;
  const cameraTargetY = (playerPy + P.h * 0.5 - H * 0.52) * 0.016;
  const cameraFeverPulse = feverFrames > 0 ? Math.sin(elapsedFrames * 0.18) * 0.008 : 0;
  const cameraScale = 1.008 + cameraFeverPulse;
  const cameraOffsetX = -cameraTargetX + Math.sin(elapsedFrames * 0.012) * 0.35;
  const cameraOffsetY = -cameraTargetY + Math.cos(elapsedFrames * 0.01) * 0.28;
  x.save();
  if(shakeFrames > 0){
    const shakePower = (shakeFrames / (shakeFrames + 6)) * shakeIntensity;
    const dx = (Math.random() * 2 - 1) * shakePower;
    const dy = (Math.random() * 2 - 1) * shakePower;
    x.translate(dx, dy);
    shakeFrames--;
  }
  x.drawImage(BG_LAYER,0,0,W,H);
  drawProgressSpaceLayers();
  x.save();
  x.translate(cameraOffsetX * 0.12, cameraOffsetY * 0.12);
  x.drawImage(GALAXY_LAYER,0,0,W,H);
  x.drawImage(PLANET_LAYER,0,0,W,H);
  x.restore();
  const offset = interp(starOffsetPrev, starOffset, t) % H;
  x.drawImage(STAR_LAYER,0,offset - H,W,H);
  x.drawImage(STAR_LAYER,0,offset,W,H);
  const offsetNear = interp(starOffsetNearPrev, starOffsetNear, t) % H;
  x.drawImage(STAR_LAYER_NEAR,0,offsetNear - H,W,H);
  x.drawImage(STAR_LAYER_NEAR,0,offsetNear,W,H);
  x.drawImage(VIGNETTE_LAYER,0,0,W,H);
  drawGlowSprite(ANGEL_GLOW_SPRITE, W * 0.22 + Math.sin(elapsedFrames * 0.01) * 14, H * 0.18, 34, 0.08);
  drawGlowSprite(FEVER_GLOW_SPRITE, W * 0.78 + Math.cos(elapsedFrames * 0.014) * 12, H * 0.24, 30, 0.07);
  if(feverFrames > 0){
    const pulse = 0.08 + 0.06 * Math.sin(elapsedFrames * 0.3);
    x.fillStyle = `rgba(255,200,90,${0.12 + pulse})`;
    x.fillRect(0,0,W,H);
    drawFeverSkyOverlay();
  }
  x.save();
  x.translate(W * 0.5, H * 0.52);
  x.scale(cameraScale, cameraScale);
  x.translate(-W * 0.5 + cameraOffsetX, -H * 0.52 + cameraOffsetY);
  for(let i = 0; i < particles.length; i++){
    const p = particles[i];
    const px = interp(p.px, p.x, t);
    const py = interp(p.py, p.y, t);
    const life = Math.max(0, p.life / p.maxLife);
    x.fillStyle = `rgba(${p.color},${life * 0.95})`;
    x.fillRect(px, py, Math.max(1, p.size * life), Math.max(1, p.size * life));
  }
  const enemyGlowStep = E.length > ENEMY_DANGER_GLOW_MAX ? Math.ceil(E.length / ENEMY_DANGER_GLOW_MAX) : 1;
  for(let i = 0; i < E.length; i++){
    const e = E[i];
    const ex = interp(e.px, e.x, t);
    const ey = interp(e.py, e.y, t);
    const enemyBob = Math.sin((elapsedFrames * 0.11) + i * 0.7) * 0.45;
    const enemyTilt = Math.max(-0.18, Math.min(0.18, (e.vx || 0) * 0.08));
    const enemyScale = 1 + Math.sin((elapsedFrames * 0.09) + i * 0.45) * 0.02;
    if(e.ignoreShield && (i % enemyGlowStep === 0)){
      const pulse = ((Math.sin(elapsedFrames * 0.25) + 1) * 0.3) + 0.3; // 0.3〜0.9
      const cx = ex + e.w * 0.5;
      const cy = ey + e.h * 0.5 + enemyBob;
      const radius = Math.max(e.w, e.h) * 0.5 + 6;
      drawGlowSprite(ENEMY_DANGER_GLOW_SPRITE, cx, cy, radius, pulse);
    }
    if(e.skin.img.complete){
      drawActorSprite(e.skin.img, ex, ey + enemyBob, e.w, e.h, {
        rotation: enemyTilt,
        scaleX: enemyScale,
        scaleY: 1 / enemyScale,
        shadowAlpha: 0.16
      });
    }else{
      x.fillStyle='#f33'; x.fillRect(ex,ey,e.w,e.h);
    }
  }
  const angelGlowStep = angels.length > ANGEL_GLOW_MAX ? Math.ceil(angels.length / ANGEL_GLOW_MAX) : 1;
  for(let i = 0; i < angels.length; i++){
    const a = angels[i];
    const ax = interp(a.px, a.x, t);
    const ay = interp(a.py, a.y, t);
    const angelBob = Math.sin((elapsedFrames * 0.12) + i * 0.8) * 0.7;
    if(i % angelGlowStep === 0){
      const pulse = ((Math.sin(elapsedFrames * 0.2) + 1) * 0.25) + 0.35; // 0.35〜0.85
      const cx = ax + a.w * 0.5;
      const cy = ay + a.h * 0.5 + angelBob;
      const radius = Math.max(a.w, a.h) * 0.5 + 6;
      drawGlowSprite(ANGEL_GLOW_SPRITE, cx, cy, radius, pulse);
    }
    if(a.skin.img.complete){
      drawActorSprite(a.skin.img, ax, ay + angelBob, a.w, a.h, {
        rotation: Math.sin((elapsedFrames * 0.08) + i * 0.5) * 0.08,
        scaleX: 1.04,
        scaleY: 0.98,
        shadowAlpha: 0.12
      });
    }else{
      x.fillStyle='#fff'; x.fillRect(ax,ay,a.w,a.h);
    }
  }
  const px = playerPx;
  const py = playerPy;
  const playerShift = px - P.px;
  const playerTilt = Math.max(-0.24, Math.min(0.24, playerShift * 0.12));
  const playerScaleX = 1 + Math.min(0.08, Math.abs(playerShift) * 0.03);
  const playerScaleY = 1 - Math.min(0.06, Math.abs(playerShift) * 0.02);
  const playerBob = Math.sin(elapsedFrames * (feverFrames > 0 ? 0.28 : 0.16)) * (feverFrames > 0 ? 0.7 : 0.24);
  const playerGlowPulse = 0.52 + 0.48 * Math.sin(elapsedFrames * 0.14);
  const playerGlowRadius = feverFrames > 0 ? 12.8 : 11.2 + playerGlowPulse * 1.8;
  const playerGlowAlpha = feverFrames > 0 ? 0.12 : 0.12 + playerGlowPulse * 0.06;
  drawGlowSprite(
    PLAYER_GLOW_SPRITE,
    px + P.w * 0.5,
    py + P.h * 0.5 + playerBob * 0.5,
    playerGlowRadius,
    playerGlowAlpha
  );
  if(P.skin.img.complete){
    if(feverFrames > 0){
      drawActorSprite(P.skin.img, P.px - playerShift * 0.45, py - 0.6, P.w, P.h, {
        rotation: playerTilt * 0.55,
        scaleX: 1.04,
        scaleY: 0.98,
        alpha: 0.2,
        shadowAlpha: 0
      });
    }
    drawActorSprite(P.skin.img, px, py + playerBob, P.w, P.h, {
      rotation: playerTilt,
      scaleX: playerScaleX,
      scaleY: playerScaleY,
      shadowAlpha: 0.2
    });
  } else {
    x.fillStyle='#0ff'; x.fillRect(px,py,P.w,P.h);
  }
  if(feverFrames > 0){
    const feverPulse = 0.55 + 0.45 * Math.sin(elapsedFrames * 0.45);
    const ringRadius = 15 + feverPulse * 7;
    const cx = px + P.w * 0.5;
    const cy = py + P.h * 0.5;
    drawGlowSprite(FEVER_GLOW_SPRITE, cx, cy, ringRadius, 0.22 * feverPulse);
  }
  if(shieldFlashFrames > 0){
    const flashRatio = shieldFlashFrames / SHIELD_FLASH_FRAMES;
    const cx = px + P.w * 0.5;
    const cy = py + P.h * 0.5;
    const radius = 32 + (1 - flashRatio) * 10;
    drawGlowSprite(SHIELD_GLOW_SPRITE, cx, cy, radius, 0.45 * flashRatio);
    shieldFlashFrames--;
  }
  x.restore();

  function drawHudPanel(px, py, pw, ph){
    x.fillStyle = 'rgba(8,12,24,0.62)';
    x.fillRect(px, py, pw, ph);
    x.strokeStyle = 'rgba(255,255,255,0.12)';
    x.strokeRect(px + 0.5, py + 0.5, pw - 1, ph - 1);
  }

  drawHudPanel(2, 2, 70, 40);
  drawHudPanel(W - 98, 2, 96, 40);
  drawHudPanel(2, H - 20, 70, 16);

  x.fillStyle='#fff';
  x.font=HUD_FONT;
  x.fillText('S:'+S,6,16);
  x.font=HUD_FONT_SMALL;
  const iconSize = 12;
  const iconBaseX = 6;
  const iconBaseY = 24;
  const iconSpacing = iconSize + 2;
  if (heroShieldIcon && heroShieldIcon.complete) {
    if (shieldCharges <= 4) {
      if (shieldCharges === 0) {
        x.save();
        x.globalAlpha = 0.35;
        x.drawImage(heroShieldIcon, iconBaseX, iconBaseY, iconSize, iconSize);
        x.restore();
      } else {
        for (let i = 0; i < shieldCharges; i++) {
          x.drawImage(heroShieldIcon, iconBaseX + iconSpacing * i, iconBaseY, iconSize, iconSize);
        }
      }
    } else {
      for (let i = 0; i < 4; i++) {
        x.drawImage(heroShieldIcon, iconBaseX + iconSpacing * i, iconBaseY, iconSize, iconSize);
      }
      x.fillText('×' + shieldCharges, iconBaseX + iconSpacing * 4 + 2, iconBaseY + iconSize - 2);
    }
  } else {
    x.fillText(shieldCharges ? ('×' + shieldCharges) : '', iconBaseX, iconBaseY + iconSize);
  }
  const feverRatio = feverFrames > 0
    ? Math.max(0, feverFrames / FEVER_DURATION_FRAMES)
    : feverGauge / FEVER_THRESHOLD_FRAMES;
  const barW = 86;
  const barH = 6;
  const barX = W - barW - 8;
  const barY = iconBaseY + 10;
  x.fillStyle = 'rgba(255,255,255,0.18)';
  x.fillRect(barX, barY, barW, barH);
  x.fillStyle = feverFrames > 0 ? 'rgba(250,204,21,0.95)' : 'rgba(125,211,252,0.95)';
  x.fillRect(barX, barY, barW * feverRatio, barH);
  x.fillStyle = '#fff';
  x.fillText(feverFrames > 0 ? 'FEVER x2' : 'FEVER', barX, barY - 2);
  x.fillText('Lv '+difficultyLevel,6,H - 8);
  x.save();
  x.textAlign = 'right';
  x.fillText('MODE '+difficultyLabel,W - 6,12);
  x.restore();
  if(announcements.length){
    const current = announcements[0];
    const inRatio = easeOutCubic(Math.min(1, current.frame / 12));
    const outRatio = easeOutCubic(Math.min(1, (current.duration - current.frame) / 16));
    const visibility = Math.min(inRatio, outRatio);
    const boxW = 144;
    const boxH = current.subtitle ? 42 : 30;
    const boxX = (W - boxW) / 2;
    const boxY = H * 0.18 - (1 - visibility) * 10;
    x.save();
    x.globalAlpha = Math.max(0, visibility);
    x.fillStyle = 'rgba(5,10,20,0.78)';
    x.fillRect(boxX, boxY, boxW, boxH);
    x.strokeStyle = current.accent;
    x.strokeRect(boxX + 0.5, boxY + 0.5, boxW - 1, boxH - 1);
    x.textAlign = 'center';
    x.fillStyle = current.accent;
    x.font = '14px "Press Start 2P", monospace';
    x.fillText(current.title, W / 2, boxY + 16);
    if(current.subtitle){
      x.fillStyle = '#f8fafc';
      x.font = '9px "Noto Sans JP", sans-serif';
      x.fillText(current.subtitle, W / 2, boxY + 31);
    }
    x.restore();
    x.textAlign = 'left';
  }

  if(!alive){
    // キャンバス上ではパネルを描かず、HTML側のUIに委ねる
  }
  drawGameFrameOverlay();
  x.restore();
}

// ====== ループ（固定タイムステップ 60Hz） ======
const FIXED_DT_MS = 1000/60;
let last = performance.now();
let acc  = 0;

function loop(now){
  let dt = now - last;
  last = now;
  if (dt > 1000) dt = 1000;
  updatePerformanceStats(dt);
  acc += dt;

  const MAX_STEPS = 3;
  let steps = 0;
  while (acc >= FIXED_DT_MS && steps < MAX_STEPS){
    if (alive) step();
    acc -= FIXED_DT_MS;
    steps++;
  }
  if (acc >= FIXED_DT_MS) {
    acc = FIXED_DT_MS * 0.5;
  }

  const alpha = acc / FIXED_DT_MS;
  draw(alpha);
  requestAnimationFrame(loop);
}
reset();
requestAnimationFrame(loop);

</script>
